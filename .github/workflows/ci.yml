name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o ./specrun ./cmd/specrun

      - name: Build echo_tool
        run: go build -o ./echo_tool ./testdata/self/echo_tool

      - name: Test
        run: go test ./... -count=1

      - name: Self-verification
        env:
          SPECRUN_BIN: ./specrun
          ECHO_TOOL_BIN: ./echo_tool
        run: ./specrun verify specs/speclang.spec
