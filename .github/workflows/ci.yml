name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o ./specrun ./cmd/specrun

      - name: Build echo_tool
        run: go build -o ./echo_tool ./testdata/self/echo_tool

      - name: Test
        run: go test ./... -count=1

      - name: Start example server
        run: |
          go run ./examples/server &
          sleep 1

      - name: Start broken server
        run: |
          go run ./testdata/self/broken_server &
          sleep 1

      - name: Start HTTP test server
        run: |
          go run ./testdata/self/http_server &
          sleep 1

      - name: Start services test server
        run: |
          PORT=9090 go run ./testdata/self/http_server &
          sleep 1

      # SPECRUN_NO_SERVICES=1 skips container lifecycle because servers are started manually above.
      # When Docker is available, `specrun verify` can manage containers automatically
      # via the services block in target — no manual server startup needed.
      - name: Self-verification
        env:
          SPECRUN_NO_SERVICES: "1"
          SPECRUN_BIN: ./specrun
          APP_URL: http://localhost:8080
          BROKEN_APP_URL: http://localhost:8081
          HTTP_TEST_URL: http://localhost:8082
          ECHO_TOOL_BIN: ./echo_tool
        run: ./specrun verify specs/speclang.spec
