name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o ./specrun ./cmd/specrun

      - name: Test
        run: go test ./... -count=1

      - name: Start example server
        run: |
          go run ./examples/server &
          sleep 1

      - name: Start broken server
        run: |
          go run ./testdata/self/broken_server &
          sleep 1

      - name: Self-verification
        run: SPECRUN_BIN=./specrun APP_URL=http://localhost:8080 BROKEN_APP_URL=http://localhost:8081 ./specrun verify specs/speclang.spec
