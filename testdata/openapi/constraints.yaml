openapi: "3.0.0"
info:
  title: Constraints Test
  version: "1.0.0"
paths: {}
components:
  schemas:
    BoundedItem:
      type: object
      required:
        - quantity
        - price
      properties:
        quantity:
          type: integer
          minimum: 1
          maximum: 100
        price:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 10000
          exclusiveMaximum: true
        rating:
          type: integer
          minimum: 0
